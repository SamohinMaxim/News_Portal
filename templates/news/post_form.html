{% extends 'flatpages/default.html' %}

{% block content %}
<h2>
    {% if view.action == 'create' %}
        Создание
    {% else %}
        Редактирование
    {% endif %} поста
</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>

<a href="{% url 'news_list' %}">Вернуться к списку</a>
{% endblock %}
